<!DOCTYPE html>
<html lang="es-MX">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="../css/login.css">
    <title>Login | Tarea 1 | Elías Lemus</title>
</head>
<body>
    <div class="contenedorPrincipal">
        <form action="">

            <h1>Iniciar Sesión</h1>

            <div class="entradas">
                <input type="text" placeholder="Usuario" required>
                <i class='bx bxs-user'></i>
            </div>
            <div class="entradas">
                <input type="password" placeholder="Contraseña" required>
                <i class='bx bxs-lock-alt'></i>
            </div>

            <div class="recordar">
                <label>
                    <input type="checkbox" id="checkbox" required> Recordar contraseña
                </label>
                <a href="#">¿Olvidaste tu contraseña?</a>
            </div>

            <button type="submit" class="loginBtn">Iniciar Sesión</button>

            <div class="registrarse">
                <p>¿No tienes una cuenta? <a href="../html/register.html">Regístrate aquí</a></p>
            </div>

        </form>
    </div>
</body>
</html>
