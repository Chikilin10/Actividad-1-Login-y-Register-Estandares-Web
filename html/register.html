<!DOCTYPE html>
<html lang="es-MX">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="../css/register.css">
    <title>Register | Tarea 1 | Elías Lemus</title>
</head>
<body>
    <div class="contenedorPrincipal">
        <form action="" class="formRegister">

            <h1>Registrate</h1>

            <div class="row">
                <div class="entradas">
                    <input type="text" placeholder="Nombre" required>
                    <i class='bx bxs-purchase-tag-alt'></i>
                </div>

                <div class="entradas">
                    <input type="text" placeholder="Apellido" required>
                    <i class='bx bxs-purchase-tag-alt'></i>
                </div>
            </div>

            <div class="entradas" >
                <input type="text" placeholder="Usuario" required>
                <i class='bx bxs-user'></i>
            </div>

            <div class="entradas">
                <input type="tel" placeholder="Numero de telefono" required>
                <i class='bx bxs-phone'></i>
            </div>

            <div class="fila">
                <select id="dia">
                    <option>Día</option>
                </select>

                <select id="mes">
                    <option>Mes</option>
                </select>

                <select id="año">
                    <option>Año</option>
                </select>
            </div>

            <div class="entradas">
                <input type="email" placeholder="Email" required>
                <i class='bx bxs-envelope'></i>
            </div>


            <div class="entradas">
                <input type="password" placeholder="Contraseña" required>
                <i class='bx bxs-lock-alt'></i>
            </div>

            <div class="recordar">
                <label>
                    <input type="checkbox" id="checkbox"> Recordar contraseña
                </label>
                <a href="#">¿Olvidaste tu contraseña?</a>
            </div>

            <button type="submit" class="loginBtn">Iniciar Sesión</button>

            <div class="registrarse">
                <p>¿Ya tienes una cuenta? <a href="../html/login.html">Inicia sesión aquí</a></p>
            </div>

        </form>
    </div>

    <script src="../js/register.js"></script>
</body>
</html>
